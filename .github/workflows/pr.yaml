name: PR

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

    build:
        name: Build
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout source
              uses: actions/checkout@v4

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build
