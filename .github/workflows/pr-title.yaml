name: PR Semantics
on:
    pull_request_target:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
            - edited

jobs:
    pr-title:
        name: Validate PR title semantics
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: amannn/action-semantic-pull-request@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.SEMANTIC_PR_TOKEN  }}
